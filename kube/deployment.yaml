kind: Service
apiVersion: v1
metadata:
  name: v4cvmfs
  namespace: v4cvmfs
  labels:
    k8s-app: v4cvmfs
spec:
  type: NodePort
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  selector:
    k8s-app: v4cvmfs
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: v4cvmfs
  namespace: v4cvmfs
  labels:
    k8s-app: v4cvmfs
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: v4cvmfs.atlas-ml.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: v4cvmfs
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: v4cvmfs
  namespace: v4cvmfs
  labels:
    k8s-app: v4cvmfs
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: v4cvmfs
  template:
    metadata:
      labels:
        k8s-app: v4cvmfs
    spec:
      containers:
        - name: v4cvmfs
          image: ivukotic/v4cvmfs:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "4"
              memory: "4Gi"
            limits:
              cpu: "48"
              memory: "16Gi"
